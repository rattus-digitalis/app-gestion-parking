<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion | Gestion Parking</title>
  <meta name="description" content="Page de connexion à votre compte utilisateur sur l'application Gestion Parking." />
  <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="Login.css" />
</head>

<body>
  <!-- ===== HEADER ===== -->
  <header>
    <div class="container header-content">
      <div class="logo" role="banner">
        🅿️ <span>Gestion Parking</span>
      </div>

      <nav class="main-nav" aria-label="Navigation principale">
        <ul class="nav-links">
          <li><a href="/index.html">Accueil</a></li>
          <li><a href="/views/Signup/Signup.html">Inscription</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main id="main-content">
    <section class="login container">
      <h1>Connexion</h1>
      <p>Connectez-vous à votre espace personnel pour gérer votre place de parking.</p>

      <form class="login-form" method="POST" action="#">
        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Mot de passe :</label>
        <input type="password" id="password" name="password" required />

        <button type="submit" class="btn btn-primary">Se connecter</button>

        <p class="signup-link">Pas encore inscrit ? <a href="/views/Signup/Signup.html">Créer un compte</a></p>
      </form>
    </section>
  </main>

  <!-- ===== FOOTER (dynamique) ===== -->
  <div id="footer"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="/assets/js/main.js" defer></script>
  <script src="Login.js" defer></script>
  <script src="/assets/js/include.js" defer></script>
</body>

</html>
