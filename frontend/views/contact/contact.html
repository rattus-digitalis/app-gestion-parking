<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Gestion Parking</title>
  <meta name="description" content="Page de contact de l'application Gestion Parking." />
  <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="contact.css" />
</head>

<body>
  <!-- ===== HEADER ===== -->
  <header>
    <div class="container header-content">
      <div class="logo" role="banner">
        🅿️ <span>Gestion Parking</span>
      </div>

      <nav class="main-nav" aria-label="Navigation principale">
        <ul class="nav-links">
          <li><a href="/index.html">Accueil</a></li>
          <li><a href="/views/login/login.html">Connexion</a></li>
          <li><a href="/views/signup/signup.html">Inscription</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main id="main-content">
    <section class="contact container">
      <h1>Contactez-nous</h1>
      <p>Une question ? Une remarque ? Envoyez-nous un message et nous vous répondrons rapidement.</p>

      <form class="contact-form" method="POST" action="#">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message :</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="btn btn-primary">Envoyer</button>
      </form>
    </section>
  </main>

  <!-- ===== FOOTER (dynamique) ===== -->
  <div id="footer"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="/assets/js/main.js" defer></script>
  <script src="contact.js" defer></script>
  <script src="/assets/js/include.js" defer></script>
</body>

</html>
