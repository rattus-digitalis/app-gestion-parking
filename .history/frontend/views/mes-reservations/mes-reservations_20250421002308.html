            <td>15/04/2025</td>
            <td>09:00</td>
            <td>17:00</td>
            <td>P45</td>

          <tr>
            <td>10/04/2025</td>

            <td>PMR1</td>

  <script src="mes-reservations.js"></script>

</html>
