<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirmation email | Gestion Parking</title>
  <link rel="stylesheet" href="confirm-email.css">
</head>
<body>

  <main class="container">
    <h1>Confirmation de votre adresse email</h1>

    <p>Un lien de confirmation a été envoyé à votre adresse email.</p>
    <p>Veuillez consulter votre boîte de réception (ou les spams) pour activer votre compte.</p>

    <p>Pas reçu d’email ?</p>
    <form>
      <input type="email" placeholder="Votre adresse email" required />
      <button type="submit">Renvoyer le lien</button>
    </form>
  </main>

  <script src="confirm-email.js"></script>
</body>
</html>
