<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Utilisateur | Gestion Parking</title>
  <link rel="stylesheet" href="dashboard-user.css">
</head>
<body>

  <main class="container">
    <h1>Bienvenue sur votre tableau de bord</h1>

    <section class="cards">
      <div class="card">
        <h2>Prochaine réservation</h2>
        <p>21 avril 2025 à 08:00</p>
      </div>

      <div class="card">
        <h2>Place assignée</h2>
        <p>P12 - RDC</p>
      </div>

      <div class="card">
        <h2>Dernier paiement</h2>
        <p>10,00 € le 15 avril 2025</p>
      </div>

      <div class="card">
        <h2>Notifications</h2>
        <p>2 nouvelles notifications</p>
      </div>
    </section>
  </main>

  <script src="dashboard-user.js"></script>
</body>
</html>
