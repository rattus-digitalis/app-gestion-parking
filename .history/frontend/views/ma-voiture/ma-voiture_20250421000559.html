<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ma voiture | Espace utilisateur</title>
  <link rel="stylesheet" href="ma-voiture.css">
</head>
<body>

  <main class="container">
    <h1>Ma voiture</h1>

    <form>
      <div class="form-group">
        <label for="marque">Marque</label>
        <input type="text" id="marque" name="marque" value="Peugeot">
      </div>

      <div class="form-group">
        <label for="modele">Modèle</label>
        <input type="text" id="modele" name="modele" value="208">
      </div>

      <div class="form-group">
        <label for="couleur">Couleur</label>
        <input type="text" id="couleur" name="couleur" value="Bleu">
      </div>

      <div class="form-group">
        <label for="immatriculation">Numéro d'immatriculation</label>
        <input type="text" id="immatriculation" name="immatriculation" value="AB-123-CD">
      </div>

      <button type="submit">Mettre à jour</button>
    </form>
  </main>

  <script src="ma-voiture.js"></script>
</body>
</html>
